  <body>

     <style>

     body{ 

    background-color: #010760;

    }

    p1{

       animation-duration: 10s;
       animation-iteration-count: 1;
       animation-direction: forwards ease-in-out;
    }
    p2{
      position: absolute;
      top: 50vh;
      left: 50vw;
      transform: translate(-50%, -50%);

    p3{
      position: absolute;
      top: 55vh;
      left: 50vw;
      transform: translate(-50%, -55%);
    }

    .text{
      font-family: 'Fondamento', cursive;
      font-size: 30px;
      color: white;
      z-index: 1000;
      text-shadow: 
      -.4px -.4px 0 #010760,  
       .4px -.4px 0 #010760,
      -.4px  .4px 0 #010760,
       .4px  .4px 0 #010760;
      
    }

  @keyframes typing {
  from { width: 0; }
  to { width: 100%; }
}
