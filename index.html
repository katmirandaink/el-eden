    <svg class="firstcurve" viewBox="0 0 500 150">
      <!-- this is defining the path of the svg and its properties such as length which is
       2 to allow you to start in the middle of the path and the fill is transparent so 
       you only see the text along the path; the path id is "curve" which references to the
       curve svg we uploaded to the repository so it knows which path to use -->
  <path id="curve" pathlength="2" fill="transparent" d="M73.2,148.6c4-6.1,65.5-96.8,178.6-95.6c111.3,1.2,170.8,90.3,175.1,97" />
  <text width="300">
    <!--the startOffset property controls where the text starts along the path so here it is
    1 to allow for the text to start in the middle (related to the path length which is 2)
    the xlink:href attribute links the text to the path which in this case is "curve" svg
    file we uploaded to the repository-->
    <textPath xlink:href="#curve" startOffset="1">
      ...porque el campo es el Edén...
    </textPath>
  </text>

</svg>

reference them both separately; the actual text path however that controls the look of the

.spin-image:hover {
 /*Flips the image horizontally (rotateY); needed to added the translate code from above to

 and not at the image's orginal center; ensures the effect actually works; doesn't work 
 without this */
  transform: translate(-50%, 0%) rotateY(360deg); 
/* transition helps make the transform effect smoother and less jagged; also controls how 
long the transform effect occurs for*/
  transition: transform .5s ease-in-out;
/* Adds depth to the 3D rotation */
  perspective: 1000px; 
}
